org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# 일부 서드파티 플러그인(예: audioplayers_android)이 자체 build.gradle에서 Java 타깃을
# 1.8로 설정해 Kotlin 17과 불일치 → AGP 8.x가 하드에러 처리. 이 교차모듈 검사를 경고로
# 다운그레이드한다. Java 1.8 + Kotlin 17 바이트코드는 dex/ART에서 무해하게 공존한다.
kotlin.jvm.target.validation.mode=warning
